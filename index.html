<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>AI Meeting Assistant Pro</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
        }

        .recording-active {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }

        textarea {
            resize: none;
        }

        .segment-card {
            transition: all 0.2s;
        }

        .segment-card:hover {
            transform: translateY(-2px);
        }

        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 20px;
        }
    </style>
</head>

<body>

    <div class="flex h-screen overflow-hidden">

        <!-- SIDEBAR -->

        <div class="w-80 bg-slate-900 text-white flex flex-col">

            <div class="p-5 border-b border-slate-700">

                <h1 class="text-2xl font-bold flex items-center gap-2">
                    <i class="fa-solid fa-microphone-lines"></i>
                    AI Meeting
                </h1>

                <p class="text-slate-400 text-sm mt-1">
                    Bản quyền © 2026 by Phạm Hồng Long & Brown Eyes
                </p>

            </div>

            <div class="p-4 border-b border-slate-700">

                <button id="newMeetingBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold transition">
                    <i class="fa-solid fa-plus"></i>
                    Cuộc họp mới
                </button>

            </div>

            <div id="segmentList"
                class="flex-1 overflow-y-auto custom-scroll p-4 space-y-4">
            </div>

        </div>

        <!-- MAIN -->

        <div class="flex-1 flex flex-col">

            <!-- TOPBAR -->

            <div class="bg-white border-b p-4 flex flex-wrap gap-3 items-center">

                <button id="startBtn"
                    class="bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-xl font-bold transition">
                    <i class="fa-solid fa-play"></i>
                    Bắt đầu ghi
                </button>

                <button id="stopBtn"
                    class="hidden bg-red-600 hover:bg-red-700 text-white px-5 py-2.5 rounded-xl font-bold transition">
                    <i class="fa-solid fa-stop"></i>
                    Dừng ghi
                </button>

                <button id="summaryBtn"
                    class="bg-violet-600 hover:bg-violet-700 text-white px-5 py-2.5 rounded-xl font-bold transition">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    AI Tóm tắt
                </button>

                <button id="saveBtn"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-bold transition">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Lưu
                </button>

                <button id="downloadBtn"
                    class="bg-slate-800 hover:bg-black text-white px-5 py-2.5 rounded-xl font-bold transition">
                    <i class="fa-solid fa-download"></i>
                    Tải báo cáo
                </button>

                <button onclick="document.getElementById('uploadInput').click()"
                    class="bg-white border border-slate-300 px-5 py-2.5 rounded-xl font-bold transition hover:bg-slate-100">
                    <i class="fa-solid fa-upload"></i>
                    Upload
                </button>
		<button id="pdfBtn"
    class="bg-red-600 hover:bg-red-700 text-white px-5 py-2.5 rounded-xl font-bold transition">
    <i class="fa-solid fa-file-pdf"></i>
    Xuất PDF
</button>

                <input
    type="file"
    id="uploadInput"
    class="hidden"
    accept=".docx,.txt,.xlsx,.xls"
/>

                <div id="statusIndicator"
                    class="hidden ml-auto items-center gap-2 text-red-600 font-bold">
                    <i class="fa-solid fa-circle recording-active"></i>
                    ĐANG GHI ÂM
                </div>

            </div>

            <!-- CONTENT -->

            <div class="flex flex-1 overflow-hidden">

                <!-- EDITOR -->

                <div class="flex-1 p-5 overflow-hidden">

                    <div class="bg-white rounded-2xl shadow h-full flex flex-col">

                        <div class="border-b p-5 flex justify-between items-center">

                            <div>
                                <h2 class="text-2xl font-bold">
                                    Transcript
                                </h2>

                                <p id="segmentTime"
                                    class="text-slate-500 text-sm mt-1">
                                    Chưa có đoạn ghi
                                </p>
                            </div>

                        </div>

                        <div class="flex-1 p-5 overflow-hidden">

                            <textarea id="editor"
                                class="w-full h-full border rounded-2xl p-5 text-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="Nội dung cuộc họp sẽ hiển thị ở đây..."></textarea>

                        </div>

                    </div>

                </div>

                <!-- AI PANEL -->

                <div class="w-[420px] bg-slate-100 border-l overflow-y-auto custom-scroll">

                    <div class="p-5 space-y-5">

                        <div class="bg-white rounded-2xl shadow p-5">

                            <h3 class="font-bold text-lg mb-3">
                                🤖 AI Tóm tắt
                            </h3>

                            <div id="summaryContent"
                                class="text-slate-700 whitespace-pre-wrap">
                                Chưa có dữ liệu...
                            </div>

                        </div>

                       
                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>

        // =========================
        // DATA
        // =========================

        let segments = [];

        let currentSegment = null;

        let currentTranscript = "";

        // =========================
        // SPEECH RECOGNITION
        // =========================

        const SpeechRecognition =
            window.SpeechRecognition ||
            window.webkitSpeechRecognition;

        let recognition = null;

        if (SpeechRecognition) {

            recognition = new SpeechRecognition();

            recognition.lang = 'vi-VN';

            recognition.continuous = true;

            recognition.interimResults = false;

            recognition.onresult = (event) => {

    for (
        let i = event.resultIndex;
        i < event.results.length;
        i++
    ) {

        if (event.results[i].isFinal) {

            const transcript =
                event.results[i][0].transcript;

            currentTranscript +=
                transcript + ". ";

            document.getElementById('editor').value =
                currentTranscript;
        }
    }
};

            recognition.onerror = (e) => {

                console.error(e);

                alert("Lỗi ghi âm: " + e.error);
            };
        }

        // =========================
        // BUTTONS
        // =========================

        const startBtn =
            document.getElementById('startBtn');

        const stopBtn =
            document.getElementById('stopBtn');

        const statusIndicator =
            document.getElementById('statusIndicator');

        // =========================
        // START RECORD
        // =========================

        startBtn.onclick = () => {

            if (!recognition) {

                alert("Trình duyệt không hỗ trợ ghi âm");

                return;
            }

            currentTranscript = "";

            document.getElementById('editor').value = "";

            currentSegment = {

                id: Date.now(),

                start: new Date(),

                end: null,

                transcript: "",

                summary: ""

                };

            recognition.start();

            startBtn.classList.add('hidden');

            stopBtn.classList.remove('hidden');

            statusIndicator.classList.remove('hidden');

            statusIndicator.classList.add('flex');

            document.getElementById('segmentTime').innerText =
                "Đang ghi âm...";
        };

        // =========================
        // STOP RECORD
        // =========================

        stopBtn.onclick = () => {

    recognition.stop();

    setTimeout(() => {

        startBtn.classList.remove('hidden');

        stopBtn.classList.add('hidden');

        statusIndicator.classList.remove('flex');

        statusIndicator.classList.add('hidden');

        currentSegment.end = new Date();

        currentSegment.transcript =
            document.getElementById('editor').value;

        if(currentSegment.transcript.trim() !== ""){

            segments.push(currentSegment);

            renderSegments();

            autoSave();
        }

        document.getElementById('segmentTime').innerText =
            "Đã lưu đoạn ghi";

    }, 1000);
};

        // =========================
        // RENDER SEGMENTS
        // =========================

        function renderSegments() {

            const segmentList =
                document.getElementById('segmentList');

            segmentList.innerHTML = "";

            segments.forEach((segment, index) => {

                const div =
                    document.createElement('div');

                div.className =
                    'segment-card bg-slate-800 p-4 rounded-2xl';

                div.innerHTML = `
                
                    <div class="flex justify-between items-center mb-3">

                        <div class="font-bold">
                            🎤 Đoạn ${index + 1}
                        </div>

                        <div class="text-xs text-slate-400">
                            ${new Date(segment.start).toLocaleTimeString()}
                        </div>

                    </div>

                    <div class="text-sm text-slate-300 line-clamp-3">
                        ${segment.transcript.substring(0, 120)}
                    </div>

                    <div class="flex gap-2 mt-4">

                        <button
                            onclick="openSegment(${segment.id})"
                            class="flex-1 bg-blue-600 hover:bg-blue-700 py-2 rounded-lg text-sm font-bold transition">
                            Mở
                        </button>

                        <button
                            onclick="deleteSegment(${segment.id})"
                            class="flex-1 bg-red-600 hover:bg-red-700 py-2 rounded-lg text-sm font-bold transition">
                            Xóa
                        </button>

                    </div>
                `;

                segmentList.appendChild(div);
            });
        }

        // =========================
        // OPEN SEGMENT
        // =========================

        function openSegment(id) {

            const segment =
                segments.find(s => s.id === id);

            if (!segment) return;

            currentSegment = segment;

            document.getElementById('editor').value =
                segment.transcript;

            document.getElementById('summaryContent').innerText =
                segment.summary || "Chưa có dữ liệu";

            document.getElementById('segmentTime').innerText =
                new Date(segment.start).toLocaleString();
        }

        // =========================
        // DELETE SEGMENT
        // =========================

        function deleteSegment(id) {

            if (!confirm("Xóa đoạn ghi này?")) return;

            segments =
                segments.filter(s => s.id !== id);

            renderSegments();

            autoSave();
        }

        // =========================
// AI SUMMARY
// =========================

document.getElementById('summaryBtn').onclick = async () => {

    if (!currentSegment) {

        alert("Chưa có đoạn ghi");

        return;
    }

    const content =
        document.getElementById('editor').value;

    if (content.trim() === "") {

        alert("Không có nội dung");

        return;
    }

    document.getElementById('summaryContent').innerText =
        "🤖 AI đang phân tích...";

    try {

        const response = await fetch(
            'https://chatbot-hop.vercel.app/api/summary',
            {
                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({
                    content
                })
            }
        );

        const data =
            await response.json();

        console.log("DATA AI:", data);

        // =========================
        // KIỂM TRA LỖI API
        // =========================

        if (data.error) {

            console.error(
                "GEMINI ERROR:",
                data.error
            );

            alert(
                data.error.message ||
                "Gemini API lỗi"
            );

            return;
        }

        // =========================
        // LẤY TEXT GEMINI
        // =========================

        const result =
            data.candidates?.[0]?.content?.parts?.[0]?.text || "";

        // =========================
        // KIỂM TRA KẾT QUẢ
        // =========================

        if (!result || result.trim() === "") {

            console.error(
                "Gemini không trả dữ liệu"
            );

            alert("AI không trả kết quả");

            document.getElementById('summaryContent').innerText =
                "Không có dữ liệu AI";

             return;
        }

        // =========================
        // HIỂN THỊ KẾT QUẢ
        // =========================

        document.getElementById('summaryContent').innerText =
            result;

        
        currentSegment.summary =
            result;

        autoSave();

    } catch (error) {

        console.error(error);

        alert("Lỗi AI: " + error.message);
    }
};

        // =========================
        // SAVE
        // =========================

        document.getElementById('saveBtn').onclick = () => {

            autoSave();

            alert("Đã lưu dữ liệu");
        };

        // =========================
        // AUTOSAVE
        // =========================

        function autoSave() {

            localStorage.setItem(
                'meeting_segments',
                JSON.stringify(segments)
            );
        }

        // =========================
        // LOAD DATA
        // =========================

        window.onload = () => {

            const saved =
                localStorage.getItem('meeting_segments');

            if (saved) {

                segments = JSON.parse(saved);

                renderSegments();
            }
        };

        // =========================
        // NEW MEETING
        // =========================

        document.getElementById('newMeetingBtn').onclick = () => {

            if (!confirm("Tạo cuộc họp mới?")) return;

            segments = [];

            currentSegment = null;

            currentTranscript = "";

            document.getElementById('editor').value = "";

            document.getElementById('summaryContent').innerText =
                "Chưa có dữ liệu...";

            renderSegments();

            autoSave();
        };

        // =========================
        // EXPORT REPORT
        // =========================

// =========================
// EXPORT WORD
// =========================

document.getElementById('downloadBtn').onclick = async () => {

    if (
        currentSegment &&
        document.getElementById('editor').value.trim() !== ""
    ) {

        currentSegment.transcript =
            document.getElementById('editor').value;
    }

    if (segments.length === 0) {

        alert("Chưa có dữ liệu để xuất");

        return;
    }

    const children = [];

    children.push(

        new docx.Paragraph({
            alignment: docx.AlignmentType.CENTER,
            spacing: { after: 400 },
            children: [
                new docx.TextRun({
                    text: "BIÊN BẢN CUỘC HỌP",
                    bold: true,
                    size: 36,
                    font: "Times New Roman"
                })
            ]
        })
    );

    segments.forEach((segment, index) => {

        children.push(

            new docx.Paragraph({
                spacing: { before: 300, after: 200 },
                children: [
                    new docx.TextRun({
                        text: `ĐOẠN GHI ${index + 1}`,
                        bold: true,
                        size: 28,
                        font: "Times New Roman"
                    })
                ]
            })
        );

        children.push(
            new docx.Paragraph({
                children: [
                    new docx.TextRun({
                        text: `Thời gian: ${new Date(segment.start).toLocaleString()}`,
                        font: "Times New Roman"
                    })
                ]
            })
        );

        children.push(
            new docx.Paragraph({
                children: [
                    new docx.TextRun({
                        text: "Transcript:",
                        bold: true,
                        font: "Times New Roman"
                    })
                ]
            })
        );

        children.push(
            new docx.Paragraph({
                text: segment.transcript || "",
            })
        );

        children.push(
            new docx.Paragraph({
                children: [
                    new docx.TextRun({
                        text: "Tóm tắt:",
                        bold: true,
                        font: "Times New Roman"
                    })
                ]
            })
        );

        children.push(
            new docx.Paragraph({
                text: segment.summary || ""
            })
        );

        children.push(
            new docx.Paragraph({
                children: [
                    new docx.TextRun({
                        text: "Công việc:",
                        bold: true,
                        font: "Times New Roman"
                    })
                ]
            })
        );

        children.push(
            new docx.Paragraph({
                text: segment.actions || ""
            })
        );

        children.push(
            new docx.Paragraph({
                children: [
                    new docx.TextRun({
                        text: "Kết luận:",
                        bold: true,
                        font: "Times New Roman"
                    })
                ]
            })
        );

        children.push(
            new docx.Paragraph({
                text: segment.conclusion || ""
            })
        );

    });

    const doc = new docx.Document({
        sections: [
            {
                properties: {},
                children
            }
        ]
    });

    const blob =
        await docx.Packer.toBlob(doc);

    saveAs(blob, "Bien_ban_cuoc_hop.docx");
};


// =========================
// EXPORT PDF
// =========================

document.getElementById('pdfBtn').onclick = () => {

    if (
        currentSegment &&
        document.getElementById('editor').value.trim() !== ""
    ) {

        currentSegment.transcript =
            document.getElementById('editor').value;

        if (!segments.includes(currentSegment)) {

            segments.push(currentSegment);
        }
    }

    if (segments.length === 0) {

        alert("Chưa có dữ liệu để xuất");

        return;
    }

    let html = `
        <div style="
            padding:40px;
            font-family:'Times New Roman',serif;
            color:#000;
            line-height:1.8;
            font-size:16px;
        ">
            <h1 style="text-align:center;">
                BIÊN BẢN CUỘC HỌP
            </h1>
    `;

    segments.forEach((segment, index) => {

        html += `
            <hr/>

            <h2>ĐOẠN ${index + 1}</h2>

            <p>
                <b>Thời gian:</b>
                ${new Date(segment.start).toLocaleString()}
            </p>

            <h3>Transcript</h3>
            <p>${segment.transcript || ""}</p>

            <h3>Tóm tắt</h3>
            <p>${segment.summary || ""}</p>

            <h3>Công việc</h3>
            <p>${segment.actions || ""}</p>

            <h3>Kết luận</h3>
            <p>${segment.conclusion || ""}</p>
        `;
    });

    html += `</div>`;

    const div =
        document.createElement('div');

    div.innerHTML = html;

    html2pdf()
        .set({
            margin: 10,
            filename: 'Bien_ban_cuoc_hop.pdf',
            image: {
                type: 'jpeg',
                quality: 1
            },
            html2canvas: {
                scale: 3,
                useCORS: true
            },
            jsPDF: {
                unit: 'mm',
                format: 'a4',
                orientation: 'portrait'
            }
        })
        .from(div)
        .save();
};

        // =========================
        // FILE UPLOAD
        // =========================

        document.getElementById('uploadInput').onchange = async (e) => {

    const file = e.target.files[0];

    if (!file) return;

    const fileName =
        file.name.toLowerCase();

    // =========================
    // DOCX
    // =========================
    if (fileName.endsWith('.doc')) {

    alert(
        "File .doc cũ không hỗ trợ.\nHãy lưu thành .docx rồi upload lại."
    );

    return;
}
    if (fileName.endsWith('.docx')) {

        const arrayBuffer =
            await file.arrayBuffer();

        const result =
            await mammoth.extractRawText({
                arrayBuffer
            });

        const content =
            result.value;

        loadContentToEditor(
            content,
            file.name
        );

        return;
    }

    // =========================
    // EXCEL
    // =========================

    if (
        fileName.endsWith('.xlsx') ||
        fileName.endsWith('.xls')
    ) {

        const data =
            await file.arrayBuffer();

        const workbook =
            XLSX.read(data);

        let content = "";

        workbook.SheetNames.forEach(sheetName => {

            const worksheet =
                workbook.Sheets[sheetName];

            const sheetText =
                XLSX.utils.sheet_to_csv(
                    worksheet
                );

            content +=
                `\n===== SHEET: ${sheetName} =====\n`;

            content += sheetText;
        });

        loadContentToEditor(
            content,
            file.name
        );

        return;
    }

    // =========================
    // TXT
    // =========================

    const reader =
        new FileReader();

    reader.onload = function(event) {

        const content =
            event.target.result;

        loadContentToEditor(
            content,
            file.name
        );
    };

    reader.readAsText(file, 'utf-8');
};

// =========================
// LOAD CONTENT
// =========================

function loadContentToEditor(
    content,
    fileName
) {

    document.getElementById('editor').value =
        content;

    if (!currentSegment) {

        currentSegment = {

            id: Date.now(),

            start: new Date(),

            end: null,

            transcript: content,

            summary: "",

            actions: "",

            conclusion: ""
        };

        segments.push(currentSegment);

    } else {

        currentSegment.transcript =
            content;
    }

    renderSegments();

    autoSave();

    alert("Đã tải file: " + fileName);
}

    </script>

</body>

</html>
